api:
  insecure: true
  dashboard: true
providers:
  http:
    endpoint: "http://pangolin:3001/api/v1/traefik-config"
    pollInterval: "30s"
  file:
    filename: "/etc/traefik/dynamic_config.yml"
experimental:
  plugins:
    badger:
      moduleName: "github.com/fosrl/badger"
      version: "v1.1.0"
log:
  level: "warn"
  format: "common"
certificatesResolvers:
  letsencrypt:
    acme:
      dnsChallenge:
        provider: "cloudflare"
      email: "mail@sqrd.link"
      storage: "/letsencrypt/acme.json"
      caServer: "https://acme-v02.api.letsencrypt.org/directory"
entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"
    transport:
      respondingTimeouts:
        readTimeout: "60s"
    http:
      tls:
        certResolver: "letsencrypt"
serversTransport:
  insecureSkipVerify: true
