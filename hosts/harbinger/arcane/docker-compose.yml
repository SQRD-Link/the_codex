# Arcane headless agent for harbinger
# Connects outbound to Arcane manager on centuries (arcane.sqrd.link)
# No inbound port needed — uses EDGE_TRANSPORT=poll
#
# Setup:
#   1. In Arcane on centuries: Environments → Add Environment → Edge tab
#   2. Generate agent config, copy AGENT_TOKEN
#   3. Add AGENT_TOKEN to .env here
services:
  arcane-agent:
    image: ghcr.io/getarcaneapp/arcane-headless:latest
    container_name: arcane-agent
    restart: unless-stopped
    environment:
      - EDGE_AGENT=true
      - EDGE_TRANSPORT=poll
      - AGENT_TOKEN=${AGENT_TOKEN}
      - MANAGER_API_URL=https://arcane.sqrd.link
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
