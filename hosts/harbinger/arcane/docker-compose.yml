# Arcane headless agent for harbinger
# Connects back to Arcane manager on centuries via Pangolin tunnel
#
# Setup:
#   1. In Arcane on centuries: Environments → Add Environment
#      - Name: harbinger
#      - API URL: http://91.98.164.136:3553
#      - Click Add Environment → copy the generated AGENT_TOKEN
#   2. Add AGENT_TOKEN to .env
#   3. docker compose up -d

services:
  arcane-agent:
    image: ghcr.io/getarcaneapp/arcane-headless:latest
    container_name: arcane-agent
    restart: unless-stopped
    ports:
      - "3553:3553"  # Manager reaches agent on this port
    environment:
      - AGENT_MODE=true
      - EDGE_TRANSPORT=poll
      - AGENT_TOKEN=${AGENT_TOKEN}
      - MANAGER_API_URL=https://docker.sqrd.link  # Reachable via Pangolin/Newt tunnel
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - agent-data:/app/data

volumes:
  agent-data:
