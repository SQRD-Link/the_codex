# Standalone n8n instance on harbinger (Hetzner VPS)
# Independent from the n8n instance on centuries
# Data lives in Docker named volume: n8n_n8n_data
services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"  # Routed via Pangolin, no Traefik on harbinger

volumes:
  n8n_data:
    name: n8n_n8n_data  # Match existing named volume to preserve data
