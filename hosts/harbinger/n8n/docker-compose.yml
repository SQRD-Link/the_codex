# Standalone n8n instance on harbinger (Hetzner VPS)
# Independent from the n8n instance on centuries
services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    environment:
      - N8N_HOST=n8n.prtsr.nl
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.prtsr.nl/
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
    volumes:
      - /srv/docker/volumes/n8n:/home/node/.n8n
    ports:
      - "5678:5678"  # Routed via Pangolin, no Traefik on harbinger
