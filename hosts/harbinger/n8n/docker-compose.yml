# Separate n8n instance on Hetzner VPS
# Note: This is independent from the n8n instance on centuries
services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    volumes:
      - /srv/docker/volumes/n8n:/home/node/.n8n
    ports:
      - "5678:5678"  # No Traefik on harbinger — direct port exposure via Pangolin
