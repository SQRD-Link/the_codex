# Standalone n8n instance on harbinger (Hetzner VPS)
# Independent from the n8n instance on centuries
services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    volumes:
      - /srv/docker/volumes/n8n:/home/node/.n8n
    ports:
      - "5678:5678"  # Routed via Pangolin, no Traefik on harbinger
