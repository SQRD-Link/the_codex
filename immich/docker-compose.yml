
services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION}
    command: [ "start.sh", "immich" ]
    volumes:
      # 1. Map the new NFS folder for the actual library
      - /data/images/chronicles:/usr/src/app/upload
      # 2. Map /etc/localtime for correct timezones
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    depends_on:
      - redis
      - database
    restart: always
    networks:
      - proxy
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.immich.rule=Host(`${DOMAIN_NAME}`)"
      - "traefik.http.routers.immich.entrypoints=websecure"
      - "traefik.http.routers.immich.tls.certresolver=letsencrypt" 
      # Change 'myresolver' to your actual cert resolver name (e.g., letsencrypt)
      - "traefik.http.services.immich.loadbalancer.server.port=2283"

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION}
    volumes:
      # Store model cache in your specific volume path
      - /srv/docker/volumes/immich/model-cache:/cache
    env_file:
      - .env
    restart: always
    networks:
      - internal

  redis:
    container_name: immich_redis
    image: redis:6.2-alpine
    restart: always
    networks:
      - internal

  database:
    container_name: immich_postgres
    image: tensorchord/pgvecto-rs:pg14-v0.2.0@sha256:90724186f0a3517cf6914295b5ab410db9ce23190a2d9d0b9dd6463e3fa298f0
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      # Store DB data in your specific volume path
      - /srv/docker/volumes/immich/postgres:/var/lib/postgresql/data
    restart: always
    networks:
      - internal

networks:
  internal:
    driver: bridge
  proxy:
    external: true # Assumes your Traefik network is named 'proxy'
