---
- name: Update alle machines
  hosts: all:!tags_no_ansible
  become: true
  gather_facts: true
  serial: 5
  vars:
    container_virt_types: ["lxc", "openvz", "docker", "podman", "container"]

  tasks:
    - name: ℹ️ Set container fact
      ansible.builtin.set_fact:
        is_container: "{{ ansible_virtualization_type | default('') in container_virt_types }}"

    - name: ⬆️ Update en upgrade alle packages
      ansible.builtin.shell: |
        apt-get update && \
        DEBIAN_FRONTEND=noninteractive apt-get dist-upgrade -y --auto-remove --purge
      register: apt_result
      until: apt_result.rc == 0
      retries: 10
      delay: 30

    - name: 🔍 Check of reboot nodig is
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: 🔄 Reboot indien nodig
      ansible.builtin.reboot:
        reboot_timeout: 900
      when:
        - not is_container
        - reboot_required.stat.exists
