services:
    # ================================
    # JELLYFIN
    # ================================
    jellyfin:
        image: lscr.io/linuxserver/jellyfin:latest
        container_name: jellyfin
        restart: unless-stopped
        environment:
            - PUID=3001
            - PGID=3001
            - TZ=Europe/Amsterdam
        volumes:
            - /srv/docker/volumes/jellyfin/config:/config
            - /data/media/movies:/movies
            - /data/media/TV:/tv
        labels:
            - "traefik.enable=true"
            - "traefik.docker.network=proxy"
            - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.sqrd.link`)"
            - "traefik.http.routers.jellyfin.entrypoints=websecure"
            - "traefik.http.routers.jellyfin.tls=true"
            - "traefik.http.routers.jellyfin.tls.certresolver=cf"
            - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"
        networks:
            - proxy

    # ================================
    # QBITTORRENT
    # ================================
    qbittorrent:
        image: lscr.io/linuxserver/qbittorrent:latest
        container_name: qbittorrent
        restart: unless-stopped
        environment:
            - PUID=3001
            - PGID=3001
            - TZ=Europe/Amsterdam
            - WEBUI_PORT=8080
        volumes:
            - /srv/docker/volumes/qbittorrent/config:/config
            - /data/media/downloads:/downloads
        labels:
            - "traefik.enable=true"
            - "traefik.docker.network=proxy"
            - "traefik.http.routers.qbittorrent.rule=Host(`qbittorrent.sqrd.link`)"
            - "traefik.http.routers.qbittorrent.entrypoints=websecure"
            - "traefik.http.routers.qbittorrent.tls=true"
            - "traefik.http.routers.qbittorrent.tls.certresolver=cf"
            - "traefik.http.services.qbittorrent.loadbalancer.server.port=8080"
        networks:
            - proxy

