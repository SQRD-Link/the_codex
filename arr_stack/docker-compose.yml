    sabnzbd:
        image: lscr.io/linuxserver/sabnzbd:latest
        container_name: sabnzbd
        restart: unless-stopped
        environment:
            - PUID=3001
            - PGID=3001
            - TZ=Europe/Amsterdam
        volumes:
            - /srv/docker/volumes/sabnzbd/config:/config
            - /data/media/downloads:/downloads
            - /data/media/tempdl:/tempdl
            - /data/media/get:/get
            - /data/media/movies:/movies
            - /data/media/TV:/tv
